<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#16201f" />
    <title>训练记录</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">本地训练日志</p>
          <h1>训练记录</h1>
        </div>
        <button class="icon-button" id="backup-shortcut" type="button" aria-label="导出备份" title="导出备份">
          <span aria-hidden="true">↓</span>
        </button>
      </header>

      <main>
        <section class="view active" id="today-view" aria-labelledby="today-tab">
          <div class="today-head">
            <div>
              <label for="workout-date">训练日期</label>
              <input id="workout-date" type="date" />
            </div>
            <div class="today-stats">
              <span id="today-sets">0 组</span>
              <span id="today-volume">0 kg</span>
            </div>
          </div>

          <form class="quick-add" id="quick-add-form">
            <div class="field wide">
              <label for="exercise-picker">添加动作</label>
              <input id="exercise-picker" list="exercise-options" placeholder="搜索或输入新动作" autocomplete="off" />
              <datalist id="exercise-options"></datalist>
            </div>
            <div class="field compact">
              <label for="load-value">重量</label>
              <input id="load-value" type="number" min="0" step="0.5" inputmode="decimal" placeholder="20" />
            </div>
            <div class="field compact">
              <label for="load-unit">类型</label>
              <select id="load-unit">
                <option value="kg">kg</option>
                <option value="kg助力">kg助力</option>
                <option value="自重">自重</option>
              </select>
            </div>
            <div class="field tiny">
              <label for="target-sets">组</label>
              <input id="target-sets" type="number" min="1" max="99" step="1" inputmode="numeric" value="5" />
            </div>
            <div class="field tiny">
              <label for="target-reps">次</label>
              <input id="target-reps" type="number" min="1" max="999" step="1" inputmode="numeric" value="12" />
            </div>
            <button class="primary-button" type="submit">添加</button>
          </form>

          <div class="exercise-list" id="today-list"></div>
          <div class="empty-state" id="today-empty">
            <strong>今天还没有动作</strong>
            <span>从上方添加一个动作，训练时每完成一组就点一次。</span>
          </div>
        </section>

        <section class="view" id="calendar-view" aria-labelledby="calendar-tab">
          <div class="calendar-toolbar">
            <button class="icon-button" id="prev-month" type="button" aria-label="上个月" title="上个月">‹</button>
            <h2 id="calendar-title"></h2>
            <button class="icon-button" id="next-month" type="button" aria-label="下个月" title="下个月">›</button>
          </div>
          <div class="calendar-summary">
            <span id="month-days">0 天训练</span>
            <span id="current-streak">连续 0 天</span>
            <span id="best-streak">最长 0 天</span>
          </div>
          <div class="calendar-grid weekday-row" aria-hidden="true">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
          </div>
          <div class="calendar-grid" id="calendar-grid"></div>
          <section class="history-panel" id="history-panel">
            <h3>选择日期查看记录</h3>
            <div id="history-detail"></div>
          </section>
        </section>

        <section class="view" id="library-view" aria-labelledby="library-tab">
          <form class="library-form" id="library-form">
            <div class="field wide">
              <label for="library-name">动作名称</label>
              <input id="library-name" placeholder="例如 固定推胸" autocomplete="off" />
            </div>
            <div class="field compact">
              <label for="library-category">分类</label>
              <select id="library-category">
                <option>胸</option>
                <option>背</option>
                <option>肩</option>
                <option>腿</option>
                <option>臀</option>
                <option>手臂</option>
                <option>核心</option>
                <option>其他</option>
              </select>
            </div>
            <button class="primary-button" type="submit">保存动作</button>
          </form>
          <div class="library-list" id="library-list"></div>
        </section>

        <section class="view" id="muscle-view" aria-labelledby="muscle-tab">
          <div class="muscle-toolbar">
            <div>
              <h2>部位概览</h2>
              <p id="muscle-range">本周</p>
            </div>
            <div class="segmented" aria-label="时间范围">
              <button class="segment active" type="button" data-muscle-period="day">日</button>
              <button class="segment" type="button" data-muscle-period="week">周</button>
              <button class="segment" type="button" data-muscle-period="month">月</button>
            </div>
          </div>

          <div class="metric-tabs" aria-label="热度指标">
            <button class="metric-tab active" type="button" data-muscle-metric="sets">组数</button>
            <button class="metric-tab" type="button" data-muscle-metric="reps">次数</button>
            <button class="metric-tab" type="button" data-muscle-metric="volume">总重量</button>
            <button class="metric-tab" type="button" data-muscle-metric="maxLoad">最大重量</button>
          </div>

          <div class="muscle-stats">
            <div>
              <dt>组数</dt>
              <dd id="muscle-total-sets">0</dd>
            </div>
            <div>
              <dt>次数</dt>
              <dd id="muscle-total-reps">0</dd>
            </div>
            <div>
              <dt>总重量</dt>
              <dd id="muscle-total-volume">0 kg</dd>
            </div>
            <div>
              <dt>最大重量</dt>
              <dd id="muscle-max-load">0 kg</dd>
            </div>
          </div>

          <section class="muscle-card" aria-label="肌肉结构热力图">
            <div class="muscle-map-host" id="muscle-map-host"></div>
            <svg class="muscle-map" viewBox="0 0 760 650" role="img" aria-label="部位训练热力图">
              <title>部位概览</title>
              <rect class="map-panel" x="8" y="8" width="744" height="634" rx="26" />
              <text class="map-caption" x="44" y="70">人体肌肉的部位训练概况。</text>
              <text class="map-date" id="muscle-map-range" x="716" y="128">本周</text>

              <g class="figure front" transform="translate(210 122)">
                <path class="body-silhouette" d="M70 0c-25 0-42 18-42 44 0 17 9 31 23 39v19l-43 16-23 62-34 82 22 11 42-64 11-38 10 96-18 134h33l19-108 19 108h33l-18-134 10-96 11 38 42 64 22-11-34-82-23-62-43-16V83c14-8 23-22 23-39 0-26-17-44-42-44z" />
                <circle class="body-head" cx="70" cy="44" r="34" />
                <path class="muscle-shape" data-muscle="肩" d="M13 121c-19 2-35 17-40 47 17 4 34-3 48-23l14-23c-7-2-14-3-22-1z" />
                <path class="muscle-shape" data-muscle="肩" d="M127 121c19 2 35 17 40 47-17 4-34-3-48-23l-14-23c7-2 14-3 22-1z" />
                <path class="muscle-shape" data-muscle="胸" d="M17 126c24-13 52-5 53 28v39c-33-2-58-14-70-36 2-13 8-23 17-31z" />
                <path class="muscle-shape" data-muscle="胸" d="M123 126c-24-13-52-5-53 28v39c33-2 58-14 70-36-2-13-8-23-17-31z" />
                <path class="muscle-shape" data-muscle="核心" d="M35 198h70l-9 88H44l-9-88z" />
                <path class="muscle-detail" d="M70 198v88M39 222h62M42 248h56M47 274h46" />
                <path class="muscle-shape" data-muscle="手臂" d="M-31 181c17 3 27 13 28 30l-14 67c-15 6-29 0-34-14l10-55 10-28z" />
                <path class="muscle-shape" data-muscle="手臂" d="M171 181c-17 3-27 13-28 30l14 67c15 6 29 0 34-14l-10-55-10-28z" />
                <path class="muscle-shape" data-muscle="腿" d="M32 292c24 4 35 21 33 55L51 401H17l5-62 10-47z" />
                <path class="muscle-shape" data-muscle="腿" d="M108 292c-24 4-35 21-33 55l14 54h34l-5-62-10-47z" />
              </g>

              <g class="figure back" transform="translate(520 122)">
                <path class="body-silhouette" d="M70 0c-25 0-42 18-42 44 0 17 9 31 23 39v19l-43 16-23 62-34 82 22 11 42-64 11-38 10 96-18 134h33l19-108 19 108h33l-18-134 10-96 11 38 42 64 22-11-34-82-23-62-43-16V83c14-8 23-22 23-39 0-26-17-44-42-44z" />
                <circle class="body-head" cx="70" cy="44" r="34" />
                <path class="muscle-shape" data-muscle="肩" d="M13 121c-19 2-35 17-40 47 17 4 34-3 48-23l14-23c-7-2-14-3-22-1z" />
                <path class="muscle-shape" data-muscle="肩" d="M127 121c19 2 35 17 40 47-17 4-34-3-48-23l-14-23c7-2 14-3 22-1z" />
                <path class="muscle-shape" data-muscle="背" d="M23 120c24 12 42 34 47 68v96c-42-30-66-69-75-119 6-18 15-34 28-45z" />
                <path class="muscle-shape" data-muscle="背" d="M117 120c-24 12-42 34-47 68v96c42-30 66-69 75-119-6-18-15-34-28-45z" />
                <path class="muscle-detail" d="M70 106v184M27 152c25 24 38 54 43 88M113 152c-25 24-38 54-43 88" />
                <path class="muscle-shape" data-muscle="手臂" d="M-31 181c17 3 27 13 28 30l-14 67c-15 6-29 0-34-14l10-55 10-28z" />
                <path class="muscle-shape" data-muscle="手臂" d="M171 181c-17 3-27 13-28 30l14 67c15 6 29 0 34-14l-10-55-10-28z" />
                <path class="muscle-shape" data-muscle="臀" d="M31 280c24-11 38-2 39 21-7 23-23 36-48 40-13-20-10-41 9-61z" />
                <path class="muscle-shape" data-muscle="臀" d="M109 280c-24-11-38-2-39 21 7 23 23 36 48 40 13-20 10-41-9-61z" />
                <path class="muscle-shape" data-muscle="腿" d="M32 334c24 3 35 18 33 48l-6 19H17l6-38 9-29z" />
                <path class="muscle-shape" data-muscle="腿" d="M108 334c-24 3-35 18-33 48l6 19h42l-6-38-9-29z" />
              </g>

              <g class="map-labels">
                <path class="label-line" d="M170 178H90L70 160" />
                <text class="label-title" x="46" y="150">胸</text>
                <text class="label-value" x="46" y="170" data-muscle-value="胸">0组</text>
                <text class="label-sub" x="46" y="188" data-muscle-sub="胸">0次 / 0kg / 0kg</text>

                <path class="label-line" d="M160 252H88L68 235" />
                <text class="label-title" x="46" y="228">手臂</text>
                <text class="label-value" x="46" y="248" data-muscle-value="手臂">0组</text>
                <text class="label-sub" x="46" y="266" data-muscle-sub="手臂">0次 / 0kg / 0kg</text>

                <path class="label-line" d="M236 338H116L92 360" />
                <text class="label-title" x="46" y="356">核心</text>
                <text class="label-value" x="46" y="376" data-muscle-value="核心">0组</text>
                <text class="label-sub" x="46" y="394" data-muscle-sub="核心">0次 / 0kg / 0kg</text>

                <path class="label-line muted" d="M218 492H116L82 532" />
                <text class="label-title muted" x="46" y="526">腿</text>
                <text class="label-value muted" x="46" y="546" data-muscle-value="腿">0组</text>
                <text class="label-sub muted" x="46" y="564" data-muscle-sub="腿">0次 / 0kg / 0kg</text>

                <path class="label-line" d="M320 164h50l26-34" />
                <text class="label-title right" x="430" y="118">肩</text>
                <text class="label-value right" x="430" y="138" data-muscle-value="肩">0组</text>
                <text class="label-sub right" x="430" y="156" data-muscle-sub="肩">0次 / 0kg / 0kg</text>

                <path class="label-line" d="M500 174h-70l-30-34" />
                <text class="label-title" x="392" y="178">背</text>
                <text class="label-value" x="392" y="198" data-muscle-value="背">0组</text>
                <text class="label-sub" x="392" y="216" data-muscle-sub="背">0次 / 0kg / 0kg</text>

                <path class="label-line" d="M648 154h56l22-22" />
                <text class="label-title right" x="724" y="118">肩</text>
                <text class="label-value right" x="724" y="138" data-muscle-value="肩">0组</text>
                <text class="label-sub right" x="724" y="156" data-muscle-sub="肩">0次 / 0kg / 0kg</text>

                <path class="label-line" d="M654 268h58" />
                <text class="label-title right" x="724" y="250">手臂</text>
                <text class="label-value right" x="724" y="270" data-muscle-value="手臂">0组</text>
                <text class="label-sub right" x="724" y="288" data-muscle-sub="手臂">0次 / 0kg / 0kg</text>

                <path class="label-line muted" d="M610 410h74l30 44" />
                <text class="label-title muted right" x="724" y="450">臀</text>
                <text class="label-value muted right" x="724" y="470" data-muscle-value="臀">0组</text>
                <text class="label-sub muted right" x="724" y="488" data-muscle-sub="臀">0次 / 0kg / 0kg</text>
              </g>

              <text class="figure-name" x="280" y="570">正面</text>
              <text class="figure-name" x="590" y="570">背面</text>
              <text class="legend-text" x="584" y="612">少</text>
              <rect class="legend-low" x="616" y="596" width="22" height="20" rx="2" />
              <rect class="legend-high" x="640" y="596" width="22" height="20" rx="2" />
              <text class="legend-text" x="676" y="612">多</text>
            </svg>
          </section>
        </section>

        <section class="view" id="backup-view" aria-labelledby="backup-tab">
          <div class="backup-actions">
            <button class="primary-button" id="export-data" type="button">导出 JSON 备份</button>
            <label class="file-button" for="import-data">导入备份</label>
            <input id="import-data" type="file" accept="application/json,.json" />
          </div>
          <dl class="backup-meta">
            <div>
              <dt>训练天数</dt>
              <dd id="backup-workouts">0</dd>
            </div>
            <div>
              <dt>动作库</dt>
              <dd id="backup-exercises">0</dd>
            </div>
            <div>
              <dt>上次导出</dt>
              <dd id="backup-time">从未</dd>
            </div>
          </dl>
        </section>
      </main>

      <nav class="tabbar" aria-label="主导航">
        <button class="tab active" id="today-tab" type="button" data-view="today-view">今日</button>
        <button class="tab" id="calendar-tab" type="button" data-view="calendar-view">日历</button>
        <button class="tab" id="library-tab" type="button" data-view="library-view">动作库</button>
        <button class="tab" id="muscle-tab" type="button" data-view="muscle-view">部位</button>
        <button class="tab" id="backup-tab" type="button" data-view="backup-view">备份</button>
      </nav>
    </div>

    <template id="exercise-card-template">
      <article class="exercise-card">
        <div class="exercise-main">
          <div>
            <h3></h3>
            <p class="exercise-meta"></p>
          </div>
          <button class="delete-button" type="button" aria-label="删除动作" title="删除动作">×</button>
        </div>
        <div class="progress-row">
          <div class="progress-track"><span></span></div>
          <strong class="set-count"></strong>
        </div>
        <div class="stepper-row">
          <button class="secondary-button minus-set" type="button">-1组</button>
          <button class="plus-set" type="button">+1组</button>
        </div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
