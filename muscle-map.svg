<svg class="muscle-map" xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 480 1180" preserveAspectRatio="xMidYMin meet" role="img" aria-label="部位训练热力图">
  <title>部位概览</title>
  <desc>原创竖版肌肉分布 SVG，上方正面、下方背面，用红色深浅展示训练部位热度。</desc>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .map-panel {
      fill: #fffdf8;
      stroke: #e2ded4;
      stroke-width: 2;
    }

    .map-caption,
    .map-date,
    .figure-name,
    .legend-text {
      fill: #5f6d68;
      font-weight: 750;
    }

    .map-caption {
      font-size: 14px;
    }

    .map-date {
      font-size: 13px;
      text-anchor: end;
    }

    .body-silhouette,
    .body-head {
      fill: #edf1f4;
      stroke: #c7d1dc;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.2;
    }

    .body-hair {
      fill: #8fa3bd;
      opacity: 0.92;
    }

    .body-guide {
      fill: none;
      stroke: #c7d1dc;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.4;
      opacity: 0.72;
    }

    .muscle-shape {
      fill: var(--heat-color, #e5eaf0);
      stroke: #fffdf8;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.4;
    }

    .muscle-shape.primary {
      --heat-color: #dc2626;
      filter: drop-shadow(0 5px 7px rgba(180, 35, 24, 0.2));
    }

    .muscle-shape.assist {
      --heat-color: #f87171;
    }

    .leg-muscle {
      stroke: rgba(255, 253, 248, 0.68);
    }

    .leg-guide {
      opacity: 0.38;
    }

    .muscle-detail {
      fill: none;
      stroke: rgba(255, 253, 248, 0.92);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2.1;
    }

    .label-line {
      fill: none;
      stroke: #bfc7d4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.55;
    }

    .label-title {
      fill: #3158a7;
      font-size: 14px;
      font-weight: 850;
    }

    .label-value {
      fill: #dc2626;
      font-size: 14px;
      font-weight: 850;
    }

    .label-sub {
      fill: #7b8794;
      font-size: 8.5px;
      font-weight: 750;
    }

    .right {
      text-anchor: end;
    }

    .muted {
      opacity: 0.42;
    }

    .figure-name {
      font-size: 13px;
      text-anchor: middle;
    }

    .legend-text {
      font-size: 12px;
    }

    .legend-low {
      fill: #e5eaf0;
    }

    .legend-mid {
      fill: #f87171;
    }

    .legend-high {
      fill: #dc2626;
    }
  </style>

  <defs>
    <path id="figure-body" d="M0 0c-21 0-36 16-36 37 0 16 9 30 23 37v25l-40 17c-20 8-32 24-39 48l-18 61-32 74 20 12 38-61 13-45c2 33 4 64 7 95 2 22 5 41 2 61l-18 89h31l18-120c2-12 7-23 16-30h30c9 7 14 18 16 30l18 120h31l-18-89c-3-20 0-39 2-61 3-31 5-62 7-95l13 45 38 61 20-12-32-74-18-61c-7-24-19-40-39-48L13 99V74c14-7 23-21 23-37C36 16 21 0 0 0z" />
